name: Docker

on:
  push:
    # push events will publish a new image, so only trigger on main branch or semver tags.
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    # Run the workflow on pull_request events to ensure we can still build the image.
    # We only publish the image on push events (see if statements in steps below).
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # On pushes to main, automatically create the next patch version tag
      # (e.g. v1.1.0 -> v1.1.1) so every merge publishes semver images.
      # Tags pushed here use GITHUB_TOKEN, which intentionally does not
      # trigger another workflow run; the computed version is fed into the
      # metadata step below so images are tagged within this same run.
      # Manually pushed vX.Y.Z tags still work and set the minor/major line.
      - name: Create release tag
        id: autotag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          git fetch --tags --force --quiet
          if git describe --exact-match --match 'v*' HEAD >/dev/null 2>&1; then
            echo "HEAD already tagged; skipping auto-tag"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            echo "no existing v* tag; skipping auto-tag"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ver=${latest#v}
          major=${ver%%.*}
          minor=${ver#"$major".}; minor=${minor%%.*}
          patch=${ver##*.}
          next="$major.$minor.$((patch + 1))"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$next" -m "release: tag v$next"
          git push origin "v$next"
          {
            echo "created=true"
            echo "version=$next"
            echo "minor=$major.$minor"
            echo "major=$major"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.autotag.outputs.version }},enable=${{ steps.autotag.outputs.created == 'true' }}
            type=raw,value=${{ steps.autotag.outputs.minor }},enable=${{ steps.autotag.outputs.created == 'true' }}
            type=raw,value=${{ steps.autotag.outputs.major }},enable=${{ steps.autotag.outputs.created == 'true' }}
            type=raw,value=latest,enable=${{ steps.autotag.outputs.created == 'true' }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      # Sign the Docker image
      - name: Install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@1fc5bd396d372bee37d608f955b336615edf79c8 #v3.2.0
      - name: Sign the published Docker image
        if: github.event_name == 'push'
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-and-push.outputs.digest }}
